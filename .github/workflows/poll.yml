name: parq-poll

on:
  schedule:
    # 每30分钟触发一次(:13 和 :43,避开 GitHub 整点/15分的拥堵时段)。
    # 只用作"重启心跳":若有任务在跑则排队接班,若没在跑则尽快拉起新任务。
    # 真正的采样节奏由任务内部循环保证。
    - cron: "13,43 * * * *"
  workflow_dispatch: {}

concurrency:
  group: parq-poll
  cancel-in-progress: false   # 同一时间只跑一个;新触发的排队接班,任务被掐断时后继可立即顶上

permissions:
  contents: write

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 140        # 给2小时循环留足余量,远离 GitHub 6 小时硬顶
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests beautifulsoup4

      - name: Poll loop (任务内部每10分钟抓一次,单轮约跑2小时)
        env:
          PA_COOKIE: ${{ secrets.PA_COOKIE }}
        run: |
          git config user.name "parq-bot"
          git config user.email "parq-bot@users.noreply.github.com"
          fails=0
          end=$(( $(date +%s) + 7200 ))   # 7200 秒 = 2 小时
          while [ "$(date +%s)" -lt "$end" ]; do
            if python monitor.py; then
              fails=0
            else
              fails=$((fails + 1))
            fi

            git add -A
            if ! git diff --cached --quiet; then
              git commit -m "data $(date -u +%FT%TZ)"
              git pull --rebase --autostash || true
              git push || true
            fi

            # 连续三次抓不到(约30分钟)才判定 cookie 可能过期:提前结束并报错 -> 触发失败邮件
            if [ "$fails" -ge 3 ]; then
              echo "连续三次抓取失败,cookie 可能已过期。提前结束并以错误退出。"
              exit 1
            fi

            sleep 600   # 10 分钟
          done
          echo "本轮 2 小时循环结束,等待下次重启接班。"
