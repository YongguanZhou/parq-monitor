name: parq-poll

on:
  schedule:
    # 每小时的第37分钟触发一次,只用来"重启"循环任务(接力)。
    # 选 :37 这种奇怪分钟是为了避开 GitHub 整点/15分的拥堵时段,降低被延迟/丢弃的概率。
    # 真正的采样节奏由下面任务内部的循环保证,跟这个 cron 频率无关。
    - cron: "37 * * * *"
  workflow_dispatch: {}

concurrency:
  group: parq-poll
  cancel-in-progress: false   # 已有任务在跑时,新触发的排队接力,衔接不断档

permissions:
  contents: write

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 345        # 安全上限,低于 GitHub 单任务 6 小时硬顶
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests beautifulsoup4

      - name: Poll loop (任务内部每10分钟抓一次,约跑5.5小时)
        env:
          PA_COOKIE: ${{ secrets.PA_COOKIE }}
        run: |
          git config user.name "parq-bot"
          git config user.email "parq-bot@users.noreply.github.com"
          fails=0
          end=$(( $(date +%s) + 19800 ))   # 19800 秒 = 5.5 小时
          while [ "$(date +%s)" -lt "$end" ]; do
            if python monitor.py; then
              fails=0
            else
              fails=$((fails + 1))
            fi

            git add -A
            if ! git diff --cached --quiet; then
              git commit -m "data $(date -u +%FT%TZ)"
              git pull --rebase --autostash || true
              git push || true
            fi

            # 连续两次抓不到(约20分钟),判定 cookie 可能过期:提前结束并报错 -> 触发失败邮件
            if [ "$fails" -ge 2 ]; then
              echo "连续两次抓取失败,cookie 可能已过期。提前结束并以错误退出。"
              exit 1
            fi

            sleep 600   # 10 分钟
          done
          echo "本轮 5.5 小时循环结束,等待下次重启。"
