name: parq-poll

on:
  schedule:
    # 每3小时把循环任务重启一次。GitHub 的 cron 本来就不准,这里只用它来"重启",
    # 真正的 15 分钟节奏靠下面任务内部的 while 循环保证。
    - cron: "0 */3 * * *"
  workflow_dispatch: {}

concurrency:
  group: parq-poll
  cancel-in-progress: false   # 已有任务在跑时,新触发的排队接力,保证衔接不断档

permissions:
  contents: write

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 345        # 安全上限,低于 GitHub 单任务 6 小时硬顶
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests beautifulsoup4

      - name: Poll loop (任务内部每15分钟抓一次,约跑5.5小时)
        env:
          PA_COOKIE: ${{ secrets.PA_COOKIE }}
        run: |
          git config user.name "parq-bot"
          git config user.email "parq-bot@users.noreply.github.com"
          fails=0
          end=$(( $(date +%s) + 19800 ))   # 19800 秒 = 5.5 小时
          while [ "$(date +%s)" -lt "$end" ]; do
            if python monitor.py; then
              fails=0
            else
              fails=$((fails + 1))
            fi

            # 有新数据就提交回仓库
            git add -A
            if ! git diff --cached --quiet; then
              git commit -m "data $(date -u +%FT%TZ)"
              git pull --rebase --autostash || true
              git push || true
            fi

            # 连续两次抓不到(约30分钟),判定 cookie 可能过期:提前结束并报错 -> 触发失败邮件
            if [ "$fails" -ge 2 ]; then
              echo "连续两次抓取失败,cookie 可能已过期。提前结束并以错误退出。"
              exit 1
            fi

            sleep 900   # 15 分钟
          done
          echo "本轮 5.5 小时循环结束,等待下次重启。"
